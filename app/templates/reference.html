{% extends "base.html" %}
{% block title %}{{ title }} - Lightning Training Lab{% endblock %}

{% block content %}
<div class="p-8 max-w-4xl mx-auto">

    <!-- breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-gray-400 mb-6">
        <a href="/" class="hover:text-lab-accent transition-colors">Dashboard</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-white">{{ title }}</span>
    </nav>

    <!-- content -->
    <div class="bg-lab-dark rounded-xl border border-gray-800 p-8">
        <div class="prose prose-invert prose-violet max-w-none
                    prose-headings:text-white prose-h1:text-3xl prose-h2:text-2xl prose-h3:text-xl
                    prose-code:text-violet-400 prose-code:bg-gray-800/80 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:before:content-none prose-code:after:content-none
                    prose-pre:bg-gray-900 prose-pre:border prose-pre:border-gray-700
                    prose-a:text-lab-accent prose-a:no-underline hover:prose-a:underline
                    prose-strong:text-white
                    prose-li:text-gray-300
                    prose-th:text-gray-300 prose-td:text-gray-400
                    prose-table:border-gray-700 prose-hr:border-gray-700">
            {{ content_html | safe }}
        </div>
    </div>
</div>
{% endblock %}
