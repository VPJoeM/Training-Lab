- question: "A free user has a studio stuck loading and they have 300GB+ of data. What's the likely fix?"
  options:
    - "Delete some data and retry"
    - "Switch to a data prep machine"
    - "Upgrade to Pro tier"
    - "Clear browser cache"
  correct: 1
  explanation: "Free studios with large datasets (300GB+) should switch to a data prep machine to handle the volume."

- question: "A user reports lost studio data. What's the correct process?"
  options:
    - "Tell them data loss is permanent"
    - "Post to #customer-support-plg, tag @oncall with username, free/paid status, and teamspace/studio name"
    - "Run recovery commands yourself via SSH"
    - "Only help Enterprise customers with data recovery"
  correct: 1
  explanation: "Post to #customer-support-plg and tag @oncall with the user's details. If paid, check their total spend on Stripe. Don't try recovery commands yourself."

- question: "A user asks for a static IP for their studio. What's the answer?"
  options:
    - "Each studio gets a permanent static IP"
    - "Lightning does not have static IPs — each studio gets a new IP that changes on restart"
    - "Static IPs are available on Enterprise tier only"
    - "They can request one through support"
  correct: 1
  explanation: "Lightning doesn't provide static IPs. Each studio gets a new IP on startup. They can check it with 'curl https://ipinfo.io/ip' but it will change."

- question: "A Pro user's credits are draining faster than expected. What should you check first?"
  options:
    - "Their subscription tier"
    - "Whether autosleep is enabled and if credits auto-reload is turned on"
    - "Their browser version"
    - "The Lightning AI status page"
  correct: 1
  explanation: "Pro/Teams users can disable autosleep (studios never stop) and many don't know credits auto-reload is enabled. Both cause surprise charges."

- question: "You need to see the platform as a specific user. What do you do?"
  options:
    - "Use the impersonation tool in Support-Tooling"
    - "Log in with their credentials"
    - "Escalate to Natalie Rand — impersonation is restricted"
    - "Ask the user to share their screen"
  correct: 2
  explanation: "Account impersonation is restricted and not available to the wider team. Escalate to Natalie Rand if you need it."

- question: "A user reports SSH connection refused to their studio. They've confirmed it fails from inside the studio itself. What does this tell you?"
  options:
    - "The user's SSH key is wrong"
    - "The studio isn't running"
    - "The SSH gateway/bastion is down for their teamspace — escalate to engineering"
    - "They need to upgrade to Pro for SSH access"
  correct: 2
  explanation: "If SSH fails from inside the studio itself, it's not client-side. The bastion/gateway is down or misrouted. Escalate to #customer-support-plg with full details."

- question: "A free tier user's studio is stuck and you want to suggest duplicating it. What should you check first?"
  options:
    - "Their browser version"
    - "Their storage usage — duplicating may push them over storage limits"
    - "Whether they have a GitHub account linked"
    - "Their subscription renewal date"
  correct: 1
  explanation: "Duplication creates a copy of all data. A free tier user with 50+ GB might hit storage limits. Check their usage first and consider asking engineering to unstick or recover specific files instead."

- question: "Storage is billed at what rate once you exceed 10GB?"
  options:
    - "$1.00/GB/month"
    - "$0.10/GB/month, billed daily"
    - "$0.01/GB/hour"
    - "Storage is free for all tiers"
  correct: 1
  explanation: "Storage over 10GB is billed at $0.10/GB/month, calculated daily. This is the same for all tiers. Data connections to external sources (S3, GCS) are not billed."
