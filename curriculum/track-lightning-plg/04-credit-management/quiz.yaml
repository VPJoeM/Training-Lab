- question: "A free-tier user used 7 of their 15 credits last month. How many credits do they receive this cycle?"
  options:
    - "15 — always a full refresh"
    - "7 — only what was consumed gets replenished"
    - "8 — the remaining unused credits"
    - "22 — 15 new plus 7 unused"
  correct: 1
  explanation: "Lightning only replenishes credits equal to what the user consumed. Used 7, get 7 back."

- question: "Account A gives credits to Account B's teamspace. Account B spends them. What happens to Account A's refresh?"
  options:
    - "Account A gets full credits next cycle as normal"
    - "Account A's credits won't refresh because Account A didn't spend them"
    - "Both accounts get credits refreshed"
    - "Account B's credits get reduced instead"
  correct: 1
  explanation: "Credits only refresh for the account that actually consumed them. If Account B spent Account A's credits, Account A gets nothing back."

- question: "A user says they can't find their free credits. What's the first thing to check?"
  options:
    - "Their subscription tier on Stripe"
    - "Whether they have multiple accounts or are looking in the wrong teamspace"
    - "The Lightning AI status page"
    - "Their phone verification status"
  correct: 1
  explanation: "Most commonly, credits are sitting in a different teamspace or under a different account. Check ToolJet for all their accounts."

- question: "When do free credits refresh?"
  options:
    - "On the 1st of each month"
    - "Every 30 days from the user's sign-up date"
    - "Weekly on Mondays"
    - "Instantly when fully consumed"
  correct: 0
  explanation: "Credits refresh on the 1st of each month."

- question: "A user's credits are draining faster than expected. What's the most common cause?"
  options:
    - "Network egress fees"
    - "Storage charges for the Drive"
    - "Idle studios left running with autosleep disabled"
    - "API rate limiting penalties"
  correct: 2
  explanation: "Pro and Teams users can disable autosleep, which means studios keep running and burning credits even when idle. Free tier users can't disable autosleep."

- question: "A user has 0.5 credits left — not enough to start any studio. Their free credits won't refresh because 'previous period credits weren't used.' What do you do?"
  options:
    - "Send the !free-credits-balance shortcut explaining the refresh rule"
    - "Tell them to wait until the 1st of next month"
    - "Add 15 credits manually via ToolJet — they're in a deadlock"
    - "Escalate to engineering to fix the refresh system"
  correct: 2
  explanation: "This is a credit deadlock. The user can't consume credits (too few to start anything) so the system never refreshes. Don't explain the refresh rule — they're stuck, not confused. Just add 15 credits."

- question: "A user says their credits 'disappeared' after transferring them. What's most likely happening?"
  options:
    - "The credits were deleted by the system"
    - "They landed in a different teamspace than the user expected"
    - "The transfer failed and engineering needs to investigate"
    - "Credits can't be transferred between teamspaces"
  correct: 1
  explanation: "Credits that 'disappeared' after transfer almost always landed in a different teamspace (often 'general'). Check ALL teamspaces for the user in ToolJet."

- question: "In what order does Lightning consume credits?"
  options:
    - "Purchased first, then free, then subscription"
    - "Free credits first, then purchased credits, then subscription credits"
    - "All credits are pooled and consumed equally"
    - "Subscription credits first, then free, then purchased"
  correct: 1
  explanation: "Free credits are consumed first. Once exhausted, purchased credits are used. Subscription-included credits stack with free credits."
