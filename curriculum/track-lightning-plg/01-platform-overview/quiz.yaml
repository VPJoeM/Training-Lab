- question: "What is the top-level entity in Lightning AI's account hierarchy?"
  options:
    - "Studio"
    - "Team Space"
    - "Organization"
    - "Drive"
  correct: 2
  explanation: "The Organization is the top-level entity. Team Spaces, Studios, and Drives sit underneath it."

- question: "How many free credits do Free tier users receive per month?"
  options:
    - "5 credits"
    - "10 credits"
    - "15 credits"
    - "25 credits"
  correct: 2
  explanation: "Free tier users get 15 credits per month (roughly 80 GPU hours), refreshing on the 1st of each month."

- question: "A user signed up with GitHub. Can they log in with Google using the same email?"
  options:
    - "Yes — login methods no longer block each other"
    - "No, they must use the original auth provider"
    - "Only if they link their Google account first"
    - "Yes, but only on Pro tier"
  correct: 0
  explanation: "Login methods no longer block each other. Users can sign in with GitHub, Google, or Magic Link regardless of how they originally signed up. The auth_provider field in ToolJet shows which method they used first."

- question: "If a user only uses 4 of their 15 free credits, how many credits do they receive next cycle?"
  options:
    - "15 — full refresh regardless"
    - "4 — only what they used gets replenished"
    - "11 — the remainder carries over"
    - "0 — credits don't refresh automatically"
  correct: 1
  explanation: "Lightning only replenishes credits equal to what the user consumed. Use 4, get 4 back."

- question: "A user asks 'what does 30M free tokens mean?' What are they referring to?"
  options:
    - "Studio compute credits"
    - "The Lightning AI inference API — free hosted LLM calls"
    - "Storage allocation"
    - "Free GPU hours"
  correct: 1
  explanation: "30M free tokens/month is for the inference API (hosted LLM calls like Llama, DeepSeek). This is separate from credits, which are for compute (Studios/GPUs)."

- question: "Where do PLG customer support tickets come in?"
  options:
    - "Slack #customer-support-plg channel"
    - "Crisp (via support@lightning.ai)"
    - "Stripe dashboard"
    - "Direct to engineering on-call"
  correct: 1
  explanation: "PLG tickets arrive via email (support@lightning.ai) and route into Crisp. Enterprise support uses Slack."
