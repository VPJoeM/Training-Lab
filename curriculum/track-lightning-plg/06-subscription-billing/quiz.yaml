- question: "A user bought a $50 Pro sub (40 credits). They used 30 credits and want a refund. What can we offer?"
  options:
    - "Full $50 refund"
    - "Partial refund of $10 (proportional to 10 unused credits)"
    - "No refund — credits were partially consumed"
    - "$25 — always half the subscription price"
  correct: 1
  explanation: "Refunds are based on credits consumed. They used 30 of 40 credits, so we can only refund the proportional value of the 10 unused credits."

- question: "After creating a custom invoice on Stripe, what critical step must you NOT forget?"
  options:
    - "Email the invoice to the user"
    - "Change the invoice status to 'paid'"
    - "Update the user's ToolJet record"
    - "Post in #customer-support-plg"
  correct: 1
  explanation: "You must mark the invoice status as 'paid' after creating it, since the payment was already received."

- question: "A user wants to cancel their subscription immediately. Can they do it themselves?"
  options:
    - "Yes — self-serve cancellation is instant"
    - "No — self-serve only cancels at end of billing period. We need to cancel it for them on Stripe."
    - "Only if they're on Pro tier"
    - "Only if they have zero credits remaining"
  correct: 1
  explanation: "Self-serve cancellation only stops renewal at the end of the billing period. For immediate cancellation, we have to do it on Stripe."

- question: "What hidden cost often surprises users about running GPU studios?"
  options:
    - "Network bandwidth charges"
    - "A monitoring CPU machine (~$0.43/hr) runs alongside the GPU"
    - "Studio startup fees"
    - "Data storage per-GB charges"
  correct: 1
  explanation: "Every GPU job also spins up a monitoring CPU machine at ~$0.43/hr. Users often don't realize this additional cost."

- question: "Who should you escalate refund requests to?"
  options:
    - "Engineering via #customer-support-plg"
    - "Natalie Rand"
    - "The user's account manager"
    - "Process it yourself on Stripe"
  correct: 1
  explanation: "All refund requests go to Natalie Rand. Only she and select finance team members can issue refunds on Stripe."
