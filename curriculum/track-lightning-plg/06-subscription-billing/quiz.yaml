- question: "A user requests a refund. What's the credit threshold they must have in their teamspace?"
  options:
    - "10 credits"
    - "25 credits"
    - "50 credits"
    - "No threshold — any amount is refundable"
  correct: 2
  explanation: "Users must have 50 credits in the teamspace to be eligible for a refund."

- question: "After creating a custom invoice on Stripe, what critical step must you NOT forget?"
  options:
    - "Email the invoice to the user"
    - "Change the invoice status to 'paid'"
    - "Update the user's ToolJet record"
    - "Post in #customer-support-plg"
  correct: 1
  explanation: "You must mark the invoice status as 'paid' after creating it, since the payment was already received."

- question: "A user wants to update their billing email. Where do you need to update it?"
  options:
    - "Stripe only"
    - "ToolJet only"
    - "Stripe AND HubSpot"
    - "Crisp and Stripe"
  correct: 2
  explanation: "Billing email needs to be updated in both Stripe and HubSpot to stay in sync across systems."

- question: "What hidden cost often surprises users about running GPU studios?"
  options:
    - "Network bandwidth charges"
    - "A monitoring CPU machine (~$0.43/hr) runs alongside the GPU"
    - "Studio startup fees"
    - "Data storage per-GB charges"
  correct: 1
  explanation: "Every GPU job also spins up a monitoring CPU machine at ~$0.43/hr. Users often don't realize this additional cost."

- question: "How is compute billed on the Lightning platform?"
  options:
    - "Per minute, rounded up"
    - "Per hour, minimum 1 hour"
    - "By the second, no minimum"
    - "Flat daily rate per machine"
  correct: 2
  explanation: "Compute is billed by the second with no minimum charge. This is granular but can add up with idle studios."
